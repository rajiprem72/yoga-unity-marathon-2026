<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Participants Report</title>

<style>

body{
    font-family:Arial,sans-serif;
    margin:20px;
    background:#f5f5f5;
}

h1{
    text-align:center;
    color:#003366;
}

.status-section{
    margin-bottom:40px;
}

.status-title{
    background:#003366;
    color:white;
    padding:12px;
    border-radius:8px;
    margin-top:30px;
}

.category-title{
    background:#009688;
    color:white;
    padding:10px;
    border-radius:8px;
    margin-top:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:10px;
}

th{
    background:#1976d2;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border:1px solid #ddd;
}

.details{
    display:none;
    background:#f9f9f9;
}

.link{
    color:#1976d2;
    cursor:pointer;
    text-decoration:underline;
    font-weight:bold;
}

.detail-table{
    width:100%;
}

.detail-table td{
    padding:6px;
}

</style>

</head>

<body>

<h1>Yoga Unity Marathon 2026 Participants</h1>

<div id="report"></div>

<script>

google.script.run
.withSuccessHandler(renderReport)
.getParticipants();

function renderReport(data){

    const report=document.getElementById("report");

    const paid=data.filter(r =>
        String(r["Payment Status"]).toUpperCase()=="PAID"
    );

    const pending=data.filter(r =>
        String(r["Payment Status"]).toUpperCase()!="PAID"
    );

    createStatusSection("PAID",paid);
    createStatusSection("PENDING",pending);
}

function createStatusSection(status,records){

    const report=document.getElementById("report");

    const div=document.createElement("div");
    div.className="status-section";

    div.innerHTML=
    `<h2 class="status-title">${status}</h2>`;

    report.appendChild(div);

    createCategory(
        div,
        "5K RUN",
        records.filter(r =>
            String(r["Event Category"]).toUpperCase().includes("5")
        )
    );

    createCategory(
        div,
        "3K WALKATHON",
        records.filter(r =>
            String(r["Event Category"]).toUpperCase().includes("3")
        )
    );
}

function createCategory(parent,title,data){

    const category=document.createElement("div");

    category.innerHTML=
    `<h3 class="category-title">${title} (${data.length})</h3>`;

    parent.appendChild(category);

    if(data.length===0){

        category.innerHTML+=
        "<p>No Participants</p>";

        return;
    }

    let html=`
    <table>

    <tr>
      <th>Participant ID</th>
      <th>Full Name</th>
      <th>Mobile</th>
      <th>WhatsApp</th>
      <th>Email</th>
    </tr>
    `;

    data.forEach((row,index)=>{

        const rowId=
        title.replace(/\s/g,'')+
        index+
        Math.random();

        html+=`

        <tr>

        <td>
        <span
          class="link"
          onclick="toggleDetails('${rowId}')">
          ${row["Participant ID"]}
        </span>
        </td>

        <td>${row["Full Name"]||""}</td>

        <td>${row["Mobile"]||""}</td>

        <td>${row["WhatsApp"]||""}</td>

        <td>${row["Email"]||""}</td>

        </tr>

        <tr
         id="${rowId}"
         class="details">

         <td colspan="5">

         <table class="detail-table">

         <tr>
           <td><b>DOB</b></td>
           <td>${row["DOB"]||""}</td>
         </tr>

         <tr>
           <td><b>Age</b></td>
           <td>${row["Age"]||""}</td>
         </tr>

         <tr>
           <td><b>Gender</b></td>
           <td>${row["Gender"]||""}</td>
         </tr>

         <tr>
           <td><b>City</b></td>
           <td>${row["City"]||""}</td>
         </tr>

         <tr>
           <td><b>Occupation</b></td>
           <td>${row["Occupation"]||""}</td>
         </tr>

         <tr>
           <td><b>Event Category</b></td>
           <td>${row["Event Category"]||""}</td>
         </tr>

         <tr>
           <td><b>T-Shirt Size</b></td>
           <td>${row["T-Shirt Size"]||""}</td>
         </tr>

         <tr>
           <td><b>Emergency Contact</b></td>
           <td>${row["Emergency Contact"]||""}</td>
         </tr>

         <tr>
           <td><b>Medical Condition</b></td>
           <td>${row["Medical Condition"]||""}</td>
         </tr>

         <tr>
           <td><b>Declaration</b></td>
           <td>${row["Declaration"]||""}</td>
         </tr>

         <tr>
           <td><b>Payment ID</b></td>
           <td>${row["Payment ID"]||""}</td>
         </tr>

         <tr>
           <td><b>Payment Date</b></td>
           <td>${row["Payment Date"]||""}</td>
         </tr>

         </table>

         </td>

        </tr>
        `;
    });

    html+="</table>";

    category.innerHTML+=html;
}

function toggleDetails(id){

    const row=document.getElementById(id);

    if(row.style.display==="table-row"){
        row.style.display="none";
    }
    else{
        row.style.display="table-row";
    }
}

</script>

</body>

</html>
