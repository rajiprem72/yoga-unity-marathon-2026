<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yoga Unity Marathon Participants</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#f5f7fb;
}

h1{
    text-align:center;
    color:#003366;
    margin-bottom:30px;
}

.status-title{
    background:#003366;
    color:white;
    padding:12px;
    border-radius:8px;
    margin-top:30px;
}

.category-title{
    background:#009688;
    color:white;
    padding:10px;
    border-radius:8px;
    margin-top:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:10px;
}

th{
    background:#1976d2;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border:1px solid #ddd;
}

.link{
    color:#1976d2;
    cursor:pointer;
    font-weight:bold;
    text-decoration:underline;
}

.details{
    display:none;
    background:#f9f9f9;
}

.loading{
    text-align:center;
    font-size:20px;
    padding:50px;
}

.error{
    text-align:center;
    color:red;
    font-size:18px;
    padding:20px;
}

.detail-table{
    width:100%;
}

.detail-table td{
    padding:6px;
}

</style>

</head>

<body>

<h1>Yoga Unity Marathon 2026 Participants</h1>

<div id="statsContainer"></div>    

<div id="report">
    <div class="loading">Loading Participants...</div>
</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyhBwLFEeoi7qkLt3o2yng11lpHCeMmgjgbd4wdR1lGVxRNeSAg371Ne4uKFtLqYFcNZw/exec";

function loadStats(){

    google.script.run
    .withSuccessHandler(renderStats)
    .getParticipantStats();

}

function renderStats(stats){

    document.getElementById("statsContainer").innerHTML = `

    <div class="stats-box">

      <div class="stats-title">
        Participants Statistics
      </div>

      <table class="stats-table">

        <tr>
          <th></th>
          <th>PAID</th>
          <th>PENDING</th>
        </tr>

        <tr>
          <td>5K RUN</td>
          <td>${stats.run5k.paid}</td>
          <td>${stats.run5k.pending}</td>
        </tr>

        <tr>
          <td>3K WALKATHON</td>
          <td>${stats.walk3k.paid}</td>
          <td>${stats.walk3k.pending}</td>
        </tr>

      </table>

    </div>
    `;
}
    
    
loadStats();
loadParticipants();

function loadParticipants(){

    fetch(API_URL)

    .then(response => response.json())

    .then(data => {

        renderReport(data);

    })

    .catch(error => {

        document.getElementById("report").innerHTML =
        "<div class='error'>Unable to load participant data</div>";

        console.error(error);

    });
}

function renderReport(data){

    const report =
    document.getElementById("report");

    report.innerHTML="";

    const paid =
    data.filter(r =>
        String(r["Payment Status"] || "")
        .toUpperCase() === "PAID"
    );

    const pending =
    data.filter(r =>
        String(r["Payment Status"] || "")
        .toUpperCase() !== "PAID"
    );

    createStatusSection(
        report,
        "PAID",
        paid
    );

    createStatusSection(
        report,
        "PENDING",
        pending
    );
}

function createStatusSection(
    container,
    status,
    data
){

    const section =
    document.createElement("div");

    section.innerHTML =
    `<h2 class="status-title">${status}</h2>`;

    container.appendChild(section);

    createCategory(
        section,
        "5K RUN",
        data.filter(r =>
          String(r["Event Category"] || "")
          .toUpperCase()
          .includes("5")
        )
    );

    createCategory(
        section,
        "3K WALKATHON",
        data.filter(r =>
          String(r["Event Category"] || "")
          .toUpperCase()
          .includes("3")
        )
    );
}

function createCategory(
    parent,
    title,
    data
){

    const div =
    document.createElement("div");

    div.innerHTML =
    `<h3 class="category-title">
      ${title} (${data.length})
     </h3>`;

    parent.appendChild(div);

    if(data.length===0){

        div.innerHTML +=
        "<p>No Participants</p>";

        return;
    }

    let html = `
    <table>

    <tr>
      <th>Participant ID</th>
      <th>Full Name</th>
      <th>Mobile</th>
      <th>WhatsApp</th>
      <th>Email</th>
    </tr>
    `;

    data.forEach((row,index)=>{

        const rowId =
        "row_" +
        title.replace(/\s/g,'') +
        "_" +
        index;

        html += `

        <tr>

        <td>
        <span
        class="link"
        onclick="toggleDetails('${rowId}')">
        ${row["Participant ID"] || ""}
        </span>
        </td>

        <td>${row["Full Name"] || ""}</td>
        <td>${row["Mobile"] || ""}</td>
        <td>${row["WhatsApp"] || ""}</td>
        <td>${row["Email"] || ""}</td>

        </tr>

        <tr
         id="${rowId}"
         class="details">

         <td colspan="5">

         <table class="detail-table">

         <tr><td><b>DOB</b></td><td>${row["DOB"] || ""}</td></tr>

         <tr><td><b>Age</b></td><td>${row["Age"] || ""}</td></tr>

         <tr><td><b>Gender</b></td><td>${row["Gender"] || ""}</td></tr>

         <tr><td><b>City</b></td><td>${row["City"] || ""}</td></tr>

         <tr><td><b>Occupation</b></td><td>${row["Occupation"] || ""}</td></tr>

         <tr><td><b>Event Category</b></td><td>${row["Event Category"] || ""}</td></tr>

         <tr><td><b>T-Shirt Size</b></td><td>${row["T-Shirt Size"] || ""}</td></tr>

         <tr><td><b>Emergency Contact</b></td><td>${row["Emergency Contact"] || ""}</td></tr>

         <tr><td><b>Medical Condition</b></td><td>${row["Medical Condition"] || ""}</td></tr>

         <tr><td><b>Declaration</b></td><td>${row["Declaration"] || ""}</td></tr>

         <tr><td><b>Payment ID</b></td><td>${row["Payment ID"] || ""}</td></tr>

         <tr><td><b>Payment Date</b></td><td>${row["Payment Date"] || ""}</td></tr>

         </table>

         </td>

        </tr>
        `;
    });

    html += "</table>";

    div.innerHTML += html;
}

function toggleDetails(id){

    const row =
    document.getElementById(id);

    if(row.style.display==="table-row"){

        row.style.display="none";

    }else{

        row.style.display="table-row";
    }
}

</script>

</body>
</html>
